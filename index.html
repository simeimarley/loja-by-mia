<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>By Mia | Lingerie & Sex Shop</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <!-- Botão do Carrinho Flutuante no Topo Direito -->
        <button class="btn-carrinho-topo" onclick="abrirCarrinho()">
          🛒 Sacola (<span id="contador-carrinho">0</span>)
        </button>
        <h1 class="logo-texto">By Mia</h1>
        <p class="slogan">Para você se sentir irresistível todos os dias</p>
      </div>
    </header>

    <nav class="categorias">
      <button onclick="filtrarProdutos('todos')">Todos</button>
      <button onclick="filtrarProdutos('camisolas')">Camisolas</button>
      <button onclick="filtrarProdutos('corsets')">Corsets</button>
      <button onclick="filtrarProdutos('lingerie')">Lingeries</button>
      <button onclick="filtrarProdutos('sexshop')">Sex Shop</button>
    </nav>

    <main class="container">
      <div id="grade-produtos" class="grade-produtos"></div>
    </main>

    <div class="chat-janela" id="chat-janela">
      <div class="chat-header">
        <span>Atendente Virtual Mia 💫</span>
      </div>
      <div class="chat-mensagens" id="chat-mensagens">
        <p class="msg-bot">
          Olá! Sou a Mia, sua assistente. Como posso te ajudar a escolher a peça
          perfeita hoje?
        </p>
      </div>
      <div class="chat-input-area">
        <input
          type="text"
          id="chat-input"
          placeholder="Digite sua dúvida aqui..."
        />
        <button id="btn-enviar-chat">Enviar</button>
      </div>
    </div>

<!-- Aba Lateral do Carrinho -->
<div id="carrinho-lateral" class="carrinho-lateral">
  <div class="carrinho-header">
    <h2>Sua Sacola 💫</h2>
    <button class="btn-fechar-carrinho" onclick="fecharCarrinho()">✕</button>
  </div>
  
  <!-- Lista de itens adicionados -->
  <div id="itens-carrinho" class="carrinho-itens-container">
    <!-- Injetado via JS -->
  </div>

  <!-- Resumo e botão de fechar pedido -->
  <div class="carrinho-footer">
    <div class="carrinho-total">
      <span>Total:</span>
      <span id="valor-total-carrinho">R$ 0,00</span>
    </div>
    <button class="btn-finalizar-whats" onclick="finalizarPedidoWhats()">
      🟢 Enviar Pedido para o WhatsApp
    </button>
  </div>
</div>
<!-- Fundo escuro quando o carrinho abre -->
<div id="carrinho-overlay" class="carrinho-overlay" onclick="fecharCarrinho()"></div>

    <script src="js/produtos.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
